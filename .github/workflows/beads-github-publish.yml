name: beads-github-publish (beads → GitHub Issues)

# Projects the beads backlog onto GitHub Issues: each in-scope bead becomes one
# issue, keyed by a `<!-- beads-id: <id> -->` body marker, with title/body/labels
# and open/closed state kept in sync. See scripts/beads-github-publish.py.
#
# Runs automatically on push to main when .beads/issues.jsonl changed, publishing
# ALL beads (verified 2026-07; the one-time migration off the old ROADMAP-derived
# issues is done). This WRITES to GitHub Issues (create / edit / close).
# workflow_dispatch remains available for manual and dry runs.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print planned changes, modify nothing"
        type: boolean
        default: true
      all:
        description: "Publish every bead (default: only roadmap-labelled)"
        type: boolean
        default: true
  push:
    branches: [main]
    paths: ['.beads/issues.jsonl']

permissions:
  issues: write
  contents: read

concurrency:
  group: beads-github-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Publish beads → GitHub Issues
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ github.event_name == 'push' && '0' || (inputs.dry_run && '1' || '0') }}
        run: |
          python3 scripts/beads-github-publish.py \
            --repo "${GITHUB_REPOSITORY}" \
            ${{ (github.event_name == 'push' || inputs.all) && '--all' || '' }}
