name: beads-github-publish (beads → GitHub Issues)

# Projects the beads backlog onto GitHub Issues: each in-scope bead becomes one
# issue, keyed by a `<!-- beads-id: <id> -->` body marker, with title/body/labels
# and open/closed state kept in sync. See scripts/beads-github-publish.py.
#
# Manual + dry-run-by-default for now. This WRITES to GitHub Issues (create /
# edit / close), so it stays opt-in until a dry run is eyeballed and the one-time
# migration off the old ROADMAP-derived issues is done. Flip dry_run=false to
# publish for real; enable the push trigger below once that's trusted.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print planned changes, modify nothing"
        type: boolean
        default: true
      all:
        description: "Publish every bead (default: only roadmap-labelled)"
        type: boolean
        default: false
  # push:
  #   branches: [main]
  #   paths: ['.beads/issues.jsonl']   # enable once a real run is verified

permissions:
  issues: write
  contents: read

concurrency:
  group: beads-github-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Publish beads → GitHub Issues
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          python3 scripts/beads-github-publish.py \
            --repo "${GITHUB_REPOSITORY}" \
            ${{ inputs.all && '--all' || '' }}
