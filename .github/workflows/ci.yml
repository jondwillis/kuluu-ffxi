name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Callable as a release gate: release.yml runs this against the tagged commit
  # before building any artifacts.
  workflow_call:

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # fmt compiles nothing — no submodules, no C++ toolchain — so it gets its own
  # seconds-long job and runs in parallel with the heavier jobs below for fast
  # "you forgot to format" feedback.
  format:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: scripts/checks.sh fmt

  # clippy (check-mode) and test (codegen) share almost no compiled first-party
  # artifacts — clippy emits .rmeta that test's codegen can't reuse — so a single
  # sequential job would just recompile the ffxi-* tree twice back-to-back. They
  # run as separate parallel jobs instead. Both restore the SAME warm dependency
  # cache (Swatinem/rust-cache persists the Bevy/wgpu/Recast dep tree, not the
  # workspace crates), so the expensive tree is a cache hit in each and only the
  # first-party crates recompile. Wall-clock drops from clippy+test to
  # max(clippy, test). They share cache-key `ci`: identical dep graph → identical
  # dep rlibs → one cache, no duplicate storage.
  #
  # There is deliberately no `cargo build` job: `cargo test --workspace` already
  # compiles AND links every lib and bin in normal (non-test) mode on top of the
  # test harnesses, so it is the compile/link gate for PRs. The real per-OS
  # --release artifacts are built by release.yml, which this workflow gates — a
  # dev-profile `cargo build` here would only re-link what test already linked.
  lint:
    name: clippy
    runs-on: ubuntu-latest
    # Neutralise the macOS -isysroot CXXFLAGS in the committed .cargo/config.toml
    # (a dev-machine workaround); on Linux it points the C++ Recast bridge at a
    # non-existent macOS SDK. Cargo's non-forced [env] won't override a var
    # already in the environment, so setting it here wins.
    env:
      CXXFLAGS: ""
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          components: clippy
          cache-key: ci
          # Restore the warm dep cache on every run, but only SAVE from main, so
          # PR/Cargo.lock churn can't evict the rarely refreshed release-* caches.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: scripts/checks.sh clippy

      # Comment/doc discipline, advisory for now: continue-on-error keeps it
      # non-blocking until the tree reports zero. Promote to a hard gate (drop
      # continue-on-error) once it's clean. See run_doc() in scripts/checks.sh.
      - name: Doc lints (advisory)
        continue-on-error: true
        run: scripts/checks.sh doc

  test:
    name: test
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: ""
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-build
        with:
          cache-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test
        run: scripts/checks.sh test
