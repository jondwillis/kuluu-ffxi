name: CI

on:
  pull_request:
  push:
    branches: [main]

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: fmt · clippy · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build
        with:
          components: rustfmt, clippy
          cache-key: ci

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked --features native-window -- -D warnings

      # Comment/doc discipline, advisory for now. broken_intra_doc_links
      # catches symbol references in /// docs that no longer resolve (the
      # de-sync rot family); doc_markdown / suspicious_doc_comments catch
      # formatting. continue-on-error keeps it non-blocking until the tree
      # is clean — promote to a hard gate (drop continue-on-error, flip the
      # flags to -D) once it reports zero.
      - name: Doc lints (advisory)
        continue-on-error: true
        run: |
          RUSTDOCFLAGS="-W rustdoc::broken_intra_doc_links" \
            cargo doc --workspace --no-deps --document-private-items --locked --features native-window
          cargo clippy --workspace --locked --features native-window -- \
            -W clippy::doc_markdown -W clippy::suspicious_doc_comments \
            -W clippy::empty_docs -W clippy::undocumented_unsafe_blocks

      # Integration tests that need a live LSB server self-skip when it is
      # unreachable, so the full suite is safe on a network-isolated runner.
      - name: Test
        run: cargo test --workspace --locked

      # Build-check with the same flags the release uses, so a broken release
      # build surfaces on the PR rather than at tag time.
      - name: Build
        run: cargo build --workspace --locked --features native-window
