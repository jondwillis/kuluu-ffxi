name: roadmap-publish (ROADMAP → GitHub issues)

# Keeps the contributor-facing issue backlog in sync with the parity
# scoreboard: every not-done line in docs/ROADMAP.md becomes a labelled GitHub
# issue. Idempotent (scripts/create-issues.sh skips titles that already exist),
# so re-runs only add newly-introduced lines. This is what makes the README's
# "every roadmap line has an issue" claim self-maintaining instead of a
# hand-kept promise that silently went stale once before.

on:
  push:
    branches: [main]
    paths:
      - docs/ROADMAP.md
      - scripts/create-issues.sh
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print what would be created, create nothing"
        type: boolean
        default: false

permissions:
  issues: write

concurrency:
  group: roadmap-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Publish non-done roadmap lines as issues
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: bash scripts/create-issues.sh "${GITHUB_REPOSITORY}"
