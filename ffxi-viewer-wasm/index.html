<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ffxi-viewer</title>
    <link data-trunk rel="rust" data-bin="ffxi-viewer-wasm" data-type="main" />
    <style>
        :root {
            --chrome-bg: #0b0b10;
            --chrome-fg: #00d8d8;
            --chrome-border: #666;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--chrome-bg);
            color: var(--chrome-fg);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            overflow: hidden;
        }
        #titlebar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 4px 12px;
            color: var(--chrome-fg);
            border-bottom: 1px solid var(--chrome-border);
            font-size: 13px;
            letter-spacing: 0.5px;
            z-index: 10;
            pointer-events: none;
        }
        canvas#bevy {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="titlebar">▌ ffxi-viewer ●</div>
    <canvas id="bevy"></canvas>
</body>
</html>
